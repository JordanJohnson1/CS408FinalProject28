service: stick_skater
image: <%= ENV.fetch("KAMAL_REGISTRY_IMAGE", "ghcr.io/your-github-user/stick-skater") %>

servers:
  web:
    - <%= ENV.fetch("EC2_HOST") %>

proxy:
  ssl: <%= ENV.fetch("KAMAL_PROXY_SSL", "false") == "true" %>
  host: <%= ENV.fetch("APP_HOST", ENV.fetch("EC2_HOST")) %>

registry:
  server: <%= ENV.fetch("KAMAL_REGISTRY_SERVER", "ghcr.io") %>
  username: <%= ENV.fetch("KAMAL_REGISTRY_USERNAME") %>
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    RAILS_LOG_LEVEL: <%= ENV.fetch("RAILS_LOG_LEVEL", "info") %>
    SOLID_QUEUE_IN_PUMA: true

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "stick_skater_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: <%= ENV.fetch("EC2_SSH_USER", "ubuntu") %>
